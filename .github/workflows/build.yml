name: Build Installers

# Triggers:
#   - Push a version tag (e.g., git tag v1.0.1 && git push origin v1.0.1)
#     → builds all platforms and creates a GitHub Release
#   - Manual trigger from Actions tab (workflow_dispatch)
#     → builds all platforms, artifacts available for download

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  PYTHON_VER: "3.11.9"
  APP_VERSION: "1.0.1"

jobs:
  # ════════════════════════════════════════
  # Windows: GPU + CPU installers via Inno Setup
  # Uses PowerShell steps (cmd.exe has issues with
  # build.bat in GitHub Actions runner context)
  # ════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
        working-directory: build/windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Cache Python distribution
        uses: actions/cache@v4
        with:
          path: build/windows/python_dist
          key: python-dist-${{ env.PYTHON_VER }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-cache-${{ hashFiles('requirements.txt') }}

      - name: Cache speech models
        uses: actions/cache@v4
        with:
          path: build/windows/models_prebuilt
          key: models-whisper-v3-turbo-vosk-small-silero-lang95

      - name: Download and install Python
        run: |
          if (Test-Path "python_dist\python.exe") {
            Write-Host "  [OK] Python already cached"
          } else {
            Write-Host "  Downloading Python $env:PYTHON_VER..."
            $url = "https://www.python.org/ftp/python/$env:PYTHON_VER/python-$env:PYTHON_VER-amd64.exe"
            Invoke-WebRequest -Uri $url -OutFile python_installer.exe
            Write-Host "  Installing Python..."
            Start-Process -Wait -FilePath .\python_installer.exe -ArgumentList "/quiet InstallAllUsers=0 PrependPath=0 Include_launcher=0 Include_test=0 Include_tcltk=1 TargetDir=$PWD\python_dist"
            Remove-Item python_installer.exe -ErrorAction SilentlyContinue
          }
          & .\python_dist\python.exe -c "import tkinter; print('  [OK] Python with tkinter')"

      - name: Build Lite venv (CPU only)
        run: |
          if (Test-Path "venv_lite\Scripts\pythonw.exe") {
            Write-Host "  [OK] Lite venv already cached"
          } else {
            Write-Host "  Creating Lite venv..."
            & .\python_dist\python.exe -m venv venv_lite
            & .\venv_lite\Scripts\pip.exe install --upgrade pip -q
            Write-Host "  Installing base packages..."
            & .\venv_lite\Scripts\pip.exe install fastapi uvicorn websockets sounddevice numpy requests python-multipart -q
            Write-Host "  Installing Vosk..."
            & .\venv_lite\Scripts\pip.exe install vosk -q
            Write-Host "  Installing offline translation packages..."
            & .\venv_lite\Scripts\pip.exe install sentencepiece ctranslate2 huggingface_hub -q
            Write-Host "  Installing onnxruntime (language detection)..."
            & .\venv_lite\Scripts\pip.exe install onnxruntime -q
            Write-Host "  [OK] Lite venv ready"
          }

      - name: Build Full venv (GPU + CPU)
        run: |
          if (Test-Path "venv_full\Scripts\pythonw.exe") {
            Write-Host "  [OK] Full venv already cached"
          } else {
            Write-Host "  Creating Full venv..."
            & .\python_dist\python.exe -m venv venv_full
            & .\venv_full\Scripts\pip.exe install --upgrade pip -q
            Write-Host "  Installing base packages..."
            & .\venv_full\Scripts\pip.exe install fastapi uvicorn websockets sounddevice numpy requests python-multipart -q
            Write-Host "  Installing faster-whisper..."
            & .\venv_full\Scripts\pip.exe install faster-whisper -q
            Write-Host "  Installing Vosk..."
            & .\venv_full\Scripts\pip.exe install vosk -q
            Write-Host "  Installing offline translation packages..."
            & .\venv_full\Scripts\pip.exe install sentencepiece ctranslate2 huggingface_hub -q
            Write-Host "  Installing onnxruntime (language detection)..."
            & .\venv_full\Scripts\pip.exe install onnxruntime -q
            Write-Host "  Installing model conversion tools..."
            & .\venv_full\Scripts\pip.exe install torch --index-url https://download.pytorch.org/whl/cpu -q
            & .\venv_full\Scripts\pip.exe install transformers -q
            Write-Host "  [OK] Full venv ready (CUDA downloaded at install time)"
          }

      - name: Download speech models (best-effort)
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Path models_prebuilt -Force | Out-Null
          # Whisper model (may fail if HuggingFace requires auth — users download on first run)
          if (Test-Path "models_prebuilt\faster-whisper-large-v3-turbo\model.bin") {
            Write-Host "  [OK] Whisper model already cached"
          } else {
            Write-Host "  Downloading Whisper large-v3-turbo (~1.5 GB)..."
            try {
              & .\venv_full\Scripts\python.exe -c @"
          from huggingface_hub import snapshot_download
          snapshot_download('Systran/faster-whisper-large-v3-turbo', local_dir=r'models_prebuilt\faster-whisper-large-v3-turbo')
          print('  [OK] Whisper model downloaded')
          "@
            } catch {
              Write-Host "  [SKIP] Whisper download failed (will download on first run)"
            }
          }
          # Vosk model
          if (Test-Path "models_prebuilt\vosk-model-small-en-us-0.15\README") {
            Write-Host "  [OK] Vosk model already cached"
          } else {
            Write-Host "  Downloading Vosk small model (~40 MB)..."
            & .\python_dist\python.exe -c @"
          import urllib.request, zipfile, os
          urllib.request.urlretrieve('https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip', 'models_prebuilt/vosk.zip')
          zipfile.ZipFile('models_prebuilt/vosk.zip').extractall('models_prebuilt')
          os.unlink('models_prebuilt/vosk.zip')
          print('  [OK] Vosk model downloaded')
          "@
          }
          # Silero language detection model (MIT, ~16 MB)
          if (Test-Path "models_prebuilt\silero-lang-detect\lang_classifier_95.onnx") {
            Write-Host "  [OK] Silero lang detect already cached"
          } else {
            Write-Host "  Downloading Silero language detection model (~16 MB)..."
            New-Item -ItemType Directory -Path "models_prebuilt\silero-lang-detect" -Force | Out-Null
            & .\python_dist\python.exe -c @"
          import urllib.request
          urllib.request.urlretrieve('https://huggingface.co/deepghs/silero-lang95-onnx/resolve/main/lang_classifier_95.onnx', r'models_prebuilt\silero-lang-detect\lang_classifier_95.onnx')
          urllib.request.urlretrieve('https://huggingface.co/deepghs/silero-lang95-onnx/resolve/main/lang_dict_95.json', r'models_prebuilt\silero-lang-detect\lang_dict_95.json')
          print('  [OK] Silero lang detect downloaded')
          "@
          }

      - name: Clean __pycache__ from build artifacts
        run: |
          Write-Host "  Cleaning __pycache__ directories..."
          Get-ChildItem -Path python_dist, venv_lite, venv_full -Recurse -Directory -Filter __pycache__ -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Write-Host "  [OK] __pycache__ cleaned"

      - name: Compile CPU installer
        shell: pwsh
        working-directory: build/windows
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          Write-Host "  Using ISCC: $iscc"
          & $iscc /DEDITION=Lite installer.iss
          if ($LASTEXITCODE -ne 0) { throw "CPU installer compilation failed" }

      - name: Compile GPU installer
        shell: pwsh
        working-directory: build/windows
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          Write-Host "  Using ISCC: $iscc"
          & $iscc /DEDITION=Full installer.iss
          if ($LASTEXITCODE -ne 0) { throw "GPU installer compilation failed" }

      - name: Upload GPU installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-gpu
          path: dist/LinguaTaxi-GPU-Setup-*.exe
          retention-days: 30

      - name: Upload CPU installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-cpu
          path: dist/LinguaTaxi-CPU-Setup-*.exe
          retention-days: 30

  # ════════════════════════════════════════
  # macOS: DMG with .app bundle
  # Dependencies install on first launch
  # ════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Build DMG
        run: |
          chmod +x build/mac/build.sh
          bash build/mac/build.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/LinguaTaxi-*.dmg
          retention-days: 30

  # ════════════════════════════════════════
  # Linux: tar.gz with install script
  # ════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build tar.gz
        run: |
          chmod +x build/linux/build.sh
          bash build/linux/build.sh

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: dist/LinguaTaxi-*-linux.tar.gz
          retention-days: 30

  # ════════════════════════════════════════
  # Release: attach all artifacts to GitHub Release
  # Only runs on tag pushes (v*)
  # ════════════════════════════════════════
  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LinguaTaxi ${{ github.ref_name }}"
          draft: false
          generate_release_notes: true
          files: |
            release-assets/windows-gpu/*.exe
            release-assets/windows-cpu/*.exe
            release-assets/macos-dmg/*.dmg
            release-assets/linux-tar/*.tar.gz
          body: |
            ## Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | **Windows (GPU)** | `LinguaTaxi-GPU-Setup-1.0.1.exe` | Best accuracy — NVIDIA GPU (CUDA downloaded during install) |
            | **Windows (CPU)** | `LinguaTaxi-CPU-Setup-1.0.1.exe` | CPU only — no GPU required |
            | **macOS** | `LinguaTaxi-1.0.1.dmg` | Universal — Apple Silicon (MLX) or Intel (Vosk) |
            | **Linux** | `LinguaTaxi-1.0.1-linux.tar.gz` | Extract and run `./install.sh` |

            ## Requirements
            - **Windows**: Windows 10+ (64-bit). GPU edition needs NVIDIA GPU + internet during install.
            - **macOS**: macOS 12+. First launch installs dependencies (~2-5 min).
            - **Linux**: Python 3.10+, tkinter, PortAudio. Install script handles setup.
