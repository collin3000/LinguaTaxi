<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live Captioning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;600;700;800&family=Noto+Sans:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#00004D; --fs:42px; --max-lines:3; --font:'Atkinson Hyperlegible Next',sans-serif;
  --caption-color:#FFFFFF; --accent:#4FC3F7; --label:#90CAF9;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:#fff}
.app{display:flex;flex-direction:column;height:100vh;padding:1.5vh 3vw}
.header{text-align:center;padding:1vh 0 1.2vh;flex-shrink:0}
.header h1{font-weight:800;font-size:clamp(22px,3vw,48px);letter-spacing:.02em;text-transform:uppercase;text-shadow:0 2px 15px rgba(79,195,247,.25)}
.header .bar{width:100px;height:3px;margin:.6vh auto 0;background:linear-gradient(90deg,transparent,var(--accent),transparent)}

.sections{flex:1;display:flex;flex-direction:column;gap:1.2vh;min-height:0;overflow:hidden}
.lang-section{flex:1;display:flex;flex-direction:column;min-height:0}
.section-hdr{font-weight:700;font-size:clamp(12px,1.3vw,20px);color:var(--label);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5vh;display:flex;align-items:center;gap:6px;flex-shrink:0}
.section-hdr .dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition:.3s}
.dot.live{background:#f44336;box-shadow:0 0 6px #f44336;animation:pdot 1.5s ease-in-out infinite}
.dot.conn{background:#4CAF50;box-shadow:0 0 6px #4CAF50}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}

.scroll-box{flex:1;overflow-y:hidden;scroll-behavior:smooth;display:flex;flex-direction:column;justify-content:flex-end;min-height:0}
.scroll-inner{display:flex;flex-direction:column}
.line{font-weight:600;font-size:var(--fs);line-height:1.35;padding:.05em 0;word-wrap:break-word;overflow-wrap:break-word}
.line.interim{opacity:.45}
.speaker-tag{font-weight:800;text-transform:uppercase;opacity:.9}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);flex-shrink:0}

.footer-banner{flex-shrink:0;text-align:center;padding:.8vh 0 .3vh;display:none}
.footer-banner img{max-width:min(95%,1000px);height:auto;max-height:7vh;object-fit:contain;border-radius:5px}
.footer-banner.vis{display:block}
.no-langs{text-align:center;color:rgba(255,255,255,.15);font-size:20px;padding:40px 0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 id="title">Live Captioning</h1>
    <div class="bar"></div>
  </div>
  <div class="sections" id="sections"></div>
  <div class="footer-banner" id="footerWrap"><img id="footerImg" src="" alt=""></div>
</div>
<script>
let ws=null, cfg={}, recon=0;
const sectionsEl=document.getElementById('sections');
const slots={}; // slot_id -> {scrollBox, inner, interimEl, dotEl, color, lines[], lastSpeaker}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

function buildSections(c){
  sectionsEl.innerHTML='';
  Object.keys(slots).forEach(k=>delete slots[k]);
  const parts=[];
  if(c.show_caption!==false){
    parts.push({id:'caption', label:(c.input_lang_name||'English')+' Captioning', color:c.caption_color||'#FFF'});
  }
  (c.translations||[]).forEach(t=>{
    parts.push({id:'slot_'+t.slot, label:t.name, color:t.color, slot:t.slot});
  });
  if(parts.length===0){sectionsEl.innerHTML='<div class="no-langs">No languages configured</div>';return}
  parts.forEach((p,i)=>{
    if(i>0){const dv=document.createElement('div');dv.className='divider';sectionsEl.appendChild(dv)}
    const sec=document.createElement('div');sec.className='lang-section';
    const hdr=document.createElement('div');hdr.className='section-hdr';
    const dot=document.createElement('span');dot.className='dot';dot.id='dot_'+p.id;
    hdr.appendChild(dot);hdr.appendChild(document.createTextNode(' '+p.label));
    sec.appendChild(hdr);
    const box=document.createElement('div');box.className='scroll-box';
    const inner=document.createElement('div');inner.className='scroll-inner';
    const interimLine=document.createElement('div');
    interimLine.className='line interim';interimLine.style.color=p.color;interimLine.style.display='none';
    inner.appendChild(interimLine);
    box.appendChild(inner);sec.appendChild(box);sectionsEl.appendChild(sec);
    slots[p.id]={scrollBox:box,inner:inner,interimEl:interimLine,dotEl:dot,color:p.color,lines:[],lastSpeaker:null};
  });
}

function addFinalLine(slotId, text, speaker, lineId){
  const s=slots[slotId]; if(!s)return;
  const line=document.createElement('div');
  line.className='line';line.style.color=s.color;
  if(lineId!==undefined) line.dataset.lineId=lineId;
  // Insert speaker label when speaker changes from last finalized line
  if(speaker && speaker !== s.lastSpeaker){
    const tag=document.createElement('span');
    tag.className='speaker-tag';
    tag.textContent=speaker+': ';
    tag.style.color=s.color;
    line.appendChild(tag);
    s.lastSpeaker=speaker;
  } else if(!speaker && s.lastSpeaker){
    s.lastSpeaker=null;
  }
  const txt=document.createTextNode(text);
  line.appendChild(txt);
  line._textNode=txt; // keep reference for corrections
  s.inner.insertBefore(line, s.interimEl);
  s.interimEl.style.display='none';s.interimEl.innerHTML='';
  s.lines.push(line);
  while(s.lines.length>200){s.lines.shift().remove()}
  requestAnimationFrame(()=>{s.scrollBox.scrollTop=s.scrollBox.scrollHeight});
}

function correctLine(slotId, lineId, newText){
  const s=slots[slotId]; if(!s)return;
  for(let i=s.lines.length-1;i>=0;i--){
    if(s.lines[i].dataset.lineId==lineId){
      const el=s.lines[i];
      if(el._textNode) el._textNode.textContent=newText;
      else{
        // Fallback: rebuild keeping speaker tag
        const tag=el.querySelector('.speaker-tag');
        el.textContent='';
        if(tag) el.appendChild(tag);
        const txt=document.createTextNode(newText);
        el.appendChild(txt);el._textNode=txt;
      }
      return;
    }
  }
}

function setInterim(slotId, text, speaker){
  const s=slots[slotId]; if(!s)return;
  if(text){
    s.interimEl.innerHTML='';
    // Show inline speaker prefix on interim when speaker differs from last final
    const showSp = speaker && speaker !== s.lastSpeaker;
    if(showSp){
      const tag=document.createElement('span');
      tag.className='speaker-tag';
      tag.textContent=speaker+': ';
      s.interimEl.appendChild(tag);
    }
    s.interimEl.appendChild(document.createTextNode(text));
    s.interimEl.style.display='block';
  } else {
    s.interimEl.style.display='none';s.interimEl.innerHTML='';
  }
  requestAnimationFrame(()=>{s.scrollBox.scrollTop=s.scrollBox.scrollHeight});
}

function clearAll(){
  Object.values(slots).forEach(s=>{
    s.lines.forEach(l=>l.remove());s.lines=[];
    s.interimEl.style.display='none';s.interimEl.innerHTML='';
    s.lastSpeaker=null;
  });
}

function applyStyle(c){
  const r=document.documentElement.style;
  if(c.bg_color)r.setProperty('--bg',c.bg_color);
  if(c.font_size)r.setProperty('--fs',c.font_size+'px');
  if(c.max_lines)r.setProperty('--max-lines',c.max_lines);
  if(c.font_css)r.setProperty('--font',c.font_css);
  if(c.caption_color)r.setProperty('--caption-color',c.caption_color);
  if(c.session_title){document.getElementById('title').textContent=c.session_title;document.title=c.session_title}
  const fw=document.getElementById('footerWrap'),fi=document.getElementById('footerImg');
  if(c.footer_image){fi.src='/uploads/'+c.footer_image+'?t='+Date.now();fw.classList.add('vis')}
  else fw.classList.remove('vis');
  if(slots['caption'])slots['caption'].color=c.caption_color||'#FFF';
}

function slotKey(slot){return 'slot_'+slot}

function handleMsg(msg){
  switch(msg.type){
    case 'status':
      if(msg.state==='speech') Object.values(slots).forEach(s=>s.dotEl.className='dot live');
      else if(msg.state==='silence') Object.values(slots).forEach(s=>s.dotEl.className='dot conn');
      break;
    case 'interim':
      setInterim('caption', msg.text||'', msg.speaker||'');
      if(slots['caption'])slots['caption'].dotEl.className='dot live';
      break;
    case 'final':
      setInterim('caption','');
      if(msg.text) addFinalLine('caption', msg.text, msg.speaker||'', msg.line_id);
      break;
    case 'interim_translation':
      if(msg.slot!==undefined){
        const k=slotKey(msg.slot);
        setInterim(k, msg.translated||'', msg.speaker||'');
        if(slots[k])slots[k].dotEl.className='dot live';
      }
      break;
    case 'final_translation':
      if(msg.slot!==undefined){
        const k=slotKey(msg.slot);
        setInterim(k,'');
        if(msg.translated)addFinalLine(k, msg.translated, msg.speaker||'', msg.line_id);
      }
      break;
    case 'correct_line':
      if(msg.line_id!==undefined&&msg.text) correctLine('caption', msg.line_id, msg.text);
      break;
    case 'correct_translation':
      if(msg.line_id!==undefined&&msg.slot!==undefined&&msg.translated)
        correctLine(slotKey(msg.slot), msg.line_id, msg.translated);
      break;
    case 'speaker_change':
      // Speaker labels appear inline in the scroll — no separate header needed.
      // Backend handles buffer splitting with 0.5s retroactive offset.
      break;
    case 'clear_captions': clearAll(); break;
    case 'config_update':
      applyStyle(msg);
      if(msg.all_translations!==undefined){
        fetch('/api/config').then(r=>r.json()).then(c=>{cfg=c;buildSections(c);applyStyle(c)});
      }
      break;
  }
}

function connect(){
  ws=new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws`);
  ws.onopen=()=>{recon=0};
  ws.onmessage=e=>handleMsg(JSON.parse(e.data));
  ws.onclose=()=>{if(recon<50)setTimeout(connect,Math.min(1000*Math.pow(1.5,recon++),10000))};
  ws.onerror=()=>{};
}

fetch('/api/config').then(r=>r.json()).then(c=>{
  cfg=c; buildSections(c); applyStyle(c); connect();
}).catch(()=>connect());
</script>
</body>
</html>
